name: Distribute and Deploy

on:
  push:
    paths:
      - "images/**"
      - "config.txt"
      - "permissions.txt"

jobs:
  count-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Reset all data if delete trigger exists
        run: |
          python3 - <<'EOF'
          import os, glob

          delete_dir  = os.path.join("images", "tmp", "delete")
          images_root = "images"
          config_path = "config.txt"
          exts        = (".jpg", ".jpeg", ".png", ".webp")

          if not os.path.isdir(delete_dir):
              print("no delete folder, skipping reset")
              exit(0)

          # .gitkeep 以外のファイルが存在するか確認
          trigger_files = [
              f for f in os.listdir(delete_dir)
              if f != ".gitkeep"
          ]
          if not trigger_files:
              print("no trigger files in delete/, skipping reset")
              exit(0)

          print(f"reset triggered by: {trigger_files}")

          # ── タイプフォルダ（tmp 以外）の画像をすべて削除 ──────────────
          for type_name in os.listdir(images_root):
              if type_name == "tmp":
                  continue
              folder = os.path.join(images_root, type_name)
              if not os.path.isdir(folder):
                  continue
              for fname in os.listdir(folder):
                  if fname.lower().endswith(exts):
                      os.remove(os.path.join(folder, fname))
                      print(f"  deleted: {type_name}/{fname}")

          # ── config.txt のデータ行（コメント・空行以外）を削除 ──────────
          with open(config_path, "r", encoding="utf-8") as f:
              lines = f.readlines()

          new_lines = [
              line for line in lines
              if line.strip() == "" or line.strip().startswith("#")
          ]

          with open(config_path, "w", encoding="utf-8") as f:
              f.writelines(new_lines)

          print("config.txt data lines cleared")

          # ── delete/ 内のトリガーファイルを削除（.gitkeep は残す）──────
          for fname in trigger_files:
              os.remove(os.path.join(delete_dir, fname))
              print(f"  removed trigger: {fname}")

          print("reset complete")
          EOF

      - name: Distribute tmp images and update config.txt
        run: |
          python3 - <<'EOF'
          import os, re, shutil
          from collections import defaultdict

          tmp_dir     = os.path.join("images", "tmp")
          images_root = "images"
          config_path = "config.txt"
          exts        = (".jpg", ".jpeg", ".png", ".webp")

          if not os.path.isdir(tmp_dir):
              print("no tmp folder, skipping")
              exit(0)

          # ── tmp 内ファイルをタイプごとにグループ化（ファイル名ソート済み）──
          # ファイル名形式: [タイプ名],[投稿者名].ext  (カンマで分割、投稿者名は空可)
          type_entries = defaultdict(list)  # type_name -> [(username, src_path)]

          for fname in sorted(os.listdir(tmp_dir)):
              if not fname.lower().endswith(exts):
                  continue
              stem, _ = os.path.splitext(fname)
              if "," not in stem:
                  print(f"skip (no comma): {fname}")
                  continue
              type_name, username = stem.split(",", 1)
              if not type_name:
                  print(f"skip (empty type): {fname}")
                  continue
              type_entries[type_name].append((username, os.path.join(tmp_dir, fname)))

          if not type_entries:
              print("no valid files to process")
              if not os.listdir(tmp_dir):
                  os.rmdir(tmp_dir)
              exit(0)

          # ── config.txt 読み込み ─────────────────────────────────────────
          with open(config_path, "r", encoding="utf-8") as f:
              lines = f.readlines()

          def used_slots(lines, type_name):
              """そのタイプで使用済みのスロット番号セットを返す"""
              slots = set()
              for line in lines:
                  s = line.strip()
                  if not s or s.startswith("#"):
                      continue
                  parts = s.split(":")
                  if parts[0] == type_name and len(parts) >= 2:
                      try:
                          slots.add(int(parts[1]))
                      except ValueError:
                          pass
              return slots

          def last_index_of_type(lines, type_name):
              idx = -1
              for i, line in enumerate(lines):
                  s = line.strip()
                  if s and not s.startswith("#") and s.split(":")[0] == type_name:
                      idx = i
              return idx

          def next_slot(slots):
              """使用済みスロットの最大値 + 1 を返す（最初は 1）"""
              return max(slots, default=0) + 1

          # ── タイプごとにまとめて処理 ────────────────────────────────────
          for type_name in sorted(type_entries.keys()):
              entries    = type_entries[type_name]
              dest_dir   = os.path.join(images_root, type_name)
              os.makedirs(dest_dir, exist_ok=True)

              slots      = used_slots(lines, type_name)
              new_lines  = []

              for username, src in entries:
                  slot = next_slot(slots)
                  slots.add(slot)
                  dest_name = f"{slot:03d}.jpg"
                  shutil.move(src, os.path.join(dest_dir, dest_name))
                  new_lines.append(f"{type_name}:{slot:03d}:{username}\n")
                  print(f"  {type_name}/{dest_name}  <- {username}")

              # 同タイプグループの末尾にまとめて挿入
              last = last_index_of_type(lines, type_name)
              if last >= 0:
                  for j, line in enumerate(new_lines):
                      lines.insert(last + 1 + j, line)
              else:
                  if lines and not lines[-1].endswith("\n"):
                      lines[-1] += "\n"
                  lines.extend(new_lines)

              print(f"{type_name}: added {len(new_lines)} entries")

          # tmp フォルダが空になったら削除
          if os.path.isdir(tmp_dir) and not os.listdir(tmp_dir):
              os.rmdir(tmp_dir)

          with open(config_path, "w", encoding="utf-8") as f:
              f.writelines(lines)

          print("config.txt updated")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.txt images/
          git diff --cached --quiet || git commit -m "auto: distribute tmp images and update config.txt"
          git push

      - name: Build deploy directory (config + permissions + images only)
        run: |
          mkdir -p _site
          cp config.txt _site/
          cp permissions.txt _site/
          cp -r images/ _site/images/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: count-and-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
