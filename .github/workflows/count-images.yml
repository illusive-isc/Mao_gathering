name: Distribute and Deploy

on:
  push:
    paths:
      - "images/**"
      - "config.txt"
      - "permissions.txt"

jobs:
  count-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Distribute tmp images and update config.txt
        run: |
          python3 - <<'EOF'
          import os, shutil
          from collections import defaultdict

          tmp_dir     = os.path.join("images", "tmp")
          images_root = "images"
          config_path = "config.txt"
          exts        = (".jpg", ".jpeg", ".png", ".webp")

          if not os.path.isdir(tmp_dir):
              print("no tmp folder, skipping")
              exit(0)

          # ── tmp 内ファイルをタイプごとにグループ化（ファイル名ソート済み）──
          # ファイル名形式: [タイプ名],[投稿者名].ext  (カンマで分割)
          type_entries = defaultdict(list)  # type_name -> [(username, src_path)]

          for fname in sorted(os.listdir(tmp_dir)):
              if not fname.lower().endswith(exts):
                  continue
              stem, _ = os.path.splitext(fname)
              if "," not in stem:
                  print(f"skip (no comma): {fname}")
                  continue
              type_name, username = stem.split(",", 1)
              if not type_name or not username:
                  print(f"skip (empty type/username): {fname}")
                  continue
              type_entries[type_name].append((username, os.path.join(tmp_dir, fname)))

          if not type_entries:
              print("no valid files to process")
              if not os.listdir(tmp_dir):
                  os.rmdir(tmp_dir)
              exit(0)

          # ── config.txt 読み込み ─────────────────────────────────────────
          with open(config_path, "r", encoding="utf-8") as f:
              lines = f.readlines()

          def last_index_of_type(lines, type_name):
              idx = -1
              for i, line in enumerate(lines):
                  s = line.strip()
                  if s and not s.startswith("#") and s.split(":")[0] == type_name:
                      idx = i
              return idx

          def count_numbered_images(folder):
              """__tmp_ プレフィックスなしの確定済み画像のみカウント"""
              if not os.path.isdir(folder):
                  return 0
              return len([
                  f for f in os.listdir(folder)
                  if f.lower().endswith(exts) and not f.startswith("__tmp_")
              ])

          # ── タイプごとにまとめて処理 ────────────────────────────────────
          # sorted() でタイプ名順に処理し、各タイプ内の追加順を一貫させる
          for type_name in sorted(type_entries.keys()):
              entries = type_entries[type_name]
              dest_dir = os.path.join(images_root, type_name)
              os.makedirs(dest_dir, exist_ok=True)

              existing = count_numbered_images(dest_dir)
              new_lines = []

              for i, (username, src) in enumerate(entries, start=existing + 1):
                  # __tmp_{連番}_{投稿者名}.jpg
                  # 連番を埋め込むことでリネームステップ後の順序を明示的に保証：
                  #   既存 001.jpg, 002.jpg の後ろに __tmp_003_Alice.jpg が並ぶ
                  #   → rename 後: 001.jpg, 002.jpg, 003.jpg (Alice) ✓
                  dest_name = f"__tmp_{i:03d}_{username}.jpg"
                  shutil.move(src, os.path.join(dest_dir, dest_name))
                  new_lines.append(f"{type_name}:{username}\n")
                  print(f"  {type_name}/{dest_name}  <- {username}")

              # 同タイプグループの末尾にまとめて挿入（タイプが連続することを保証）
              last = last_index_of_type(lines, type_name)
              if last >= 0:
                  for j, line in enumerate(new_lines):
                      lines.insert(last + 1 + j, line)
              else:
                  if lines and not lines[-1].endswith("\n"):
                      lines[-1] += "\n"
                  lines.extend(new_lines)

              print(f"{type_name}: added {len(new_lines)} entries (#{existing + 1}~#{existing + len(new_lines)})")

          # tmp フォルダが空になったら削除
          if os.path.isdir(tmp_dir) and not os.listdir(tmp_dir):
              os.rmdir(tmp_dir)

          with open(config_path, "w", encoding="utf-8") as f:
              f.writelines(lines)

          print("config.txt updated")
          EOF

      - name: Rename images to sequential numbers
        run: |
          python3 - <<'EOF'
          import os

          images_root = "images"
          exts        = (".jpg", ".jpeg", ".png", ".webp")

          for type_name in os.listdir(images_root):
              folder = os.path.join(images_root, type_name)
              if not os.path.isdir(folder) or type_name == "tmp":
                  continue

              files = sorted(
                  f for f in os.listdir(folder)
                  if f.lower().endswith(exts)
              )

              # 一時名にリネームしてコンフリクト回避
              tmp_files = []
              for f in files:
                  tmp = f + ".tmp"
                  os.rename(os.path.join(folder, f), os.path.join(folder, tmp))
                  tmp_files.append(tmp)

              for i, tmp in enumerate(tmp_files, start=1):
                  _, ext = os.path.splitext(tmp[:-4])  # .tmp を除いた拡張子
                  os.rename(
                      os.path.join(folder, tmp),
                      os.path.join(folder, f"{i:03d}{ext.lower()}")
                  )
              print(f"{type_name}: {len(tmp_files)} files renamed")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.txt images/
          git diff --cached --quiet || git commit -m "auto: distribute tmp images and update config.txt"
          git push

      - name: Build deploy directory (config + permissions + images only)
        run: |
          mkdir -p _site
          cp config.txt _site/
          cp permissions.txt _site/
          cp -r images/ _site/images/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: count-and-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
