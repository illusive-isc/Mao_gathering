name: Count and Deploy

on:
  push:
    paths:
      - "images/**"
      - "config.txt"
      - "permissions.txt"

jobs:
  count-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Rename images to sequential numbers
        run: |
          python3 - <<'EOF'
          import os, re

          images_root = "images"
          exts = (".jpg", ".jpeg", ".png", ".webp")

          for type_name in os.listdir(images_root):
              folder = os.path.join(images_root, type_name)
              if not os.path.isdir(folder):
                  continue

              files = sorted(
                  f for f in os.listdir(folder)
                  if f.lower().endswith(exts)
              )

              # 一時名にリネームしてから連番に確定（上書きコンフリクト回避）
              tmp_files = []
              for f in files:
                  tmp = f + ".tmp"
                  os.rename(os.path.join(folder, f), os.path.join(folder, tmp))
                  tmp_files.append(tmp)

              for i, tmp in enumerate(tmp_files, start=1):
                  _, ext = os.path.splitext(tmp[:-4])  # .tmp を除いた拡張子
                  os.rename(
                      os.path.join(folder, tmp),
                      os.path.join(folder, f"{i:03d}{ext.lower()}")
                  )
              print(f"{type_name}: {len(tmp_files)} files renamed")
          EOF

      - name: Count images and update config.txt
        run: |
          python3 - <<'EOF'
          import os

          config_path = "config.txt"
          images_root = "images"

          with open(config_path, "r", encoding="utf-8") as f:
              lines = f.readlines()

          new_lines = []
          for line in lines:
              stripped = line.strip()
              if stripped.startswith("#") or stripped == "":
                  new_lines.append(line)
                  continue

              parts = stripped.split(":")
              type_name = parts[0]
              folder = os.path.join(images_root, type_name)

              if os.path.isdir(folder):
                  count = len([
                      f for f in os.listdir(folder)
                      if f.lower().endswith((".jpg", ".jpeg", ".png", ".webp"))
                  ])
                  parts[1] = str(count)
                  new_lines.append(":".join(parts) + "\n")
              else:
                  new_lines.append(line)

          with open(config_path, "w", encoding="utf-8") as f:
              f.writelines(new_lines)

          print("config.txt updated")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.txt
          git diff --cached --quiet || git commit -m "auto: update image counts in config.txt"
          git push

      - name: Build deploy directory (config + permissions + images only)
        run: |
          mkdir -p _site
          cp config.txt _site/
          cp permissions.txt _site/
          cp -r images/ _site/images/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: count-and-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
